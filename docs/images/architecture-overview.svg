<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
  <rect width="1400" height="820" fill="#0d1117"/>
  <text x="60" y="70" fill="#f0f6fc" font-family="Arial, sans-serif" font-size="34" font-weight="700">Tomarket Runner Architecture</text>
  <text x="60" y="105" fill="#8b949e" font-family="Arial, sans-serif" font-size="18">Single-account scheduler with HTTP-only and browser/SDK-assisted lanes</text>

  <rect x="70" y="170" width="280" height="120" rx="18" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="95" y="218" fill="#58a6ff" font-family="Arial, sans-serif" font-size="26" font-weight="700">Bootstrap Input</text>
  <text x="95" y="252" fill="#c9d1d9" font-family="Arial, sans-serif" font-size="18">launch.json</text>
  <text x="95" y="278" fill="#8b949e" font-family="Arial, sans-serif" font-size="16">Telegram WebApp launch artifact</text>

  <rect x="420" y="150" width="560" height="170" rx="20" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="450" y="198" fill="#3fb950" font-family="Arial, sans-serif" font-size="28" font-weight="700">Core Runner</text>
  <text x="450" y="232" fill="#c9d1d9" font-family="Arial, sans-serif" font-size="18">Login + scheduler + cooldown + parking + safe-mode</text>
  <text x="450" y="264" fill="#c9d1d9" font-family="Arial, sans-serif" font-size="18">Writes decision-log / error-log / state-summary</text>
  <text x="450" y="296" fill="#8b949e" font-family="Arial, sans-serif" font-size="16">Chooses nearest due lane via next_due_ts</text>

  <rect x="1080" y="170" width="250" height="120" rx="18" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="1110" y="218" fill="#d29922" font-family="Arial, sans-serif" font-size="26" font-weight="700">Logs / State</text>
  <text x="1110" y="252" fill="#c9d1d9" font-family="Arial, sans-serif" font-size="18">latest.json</text>
  <text x="1110" y="278" fill="#c9d1d9" font-family="Arial, sans-serif" font-size="18">jsonl logs + summary</text>

  <rect x="130" y="430" width="380" height="220" rx="18" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="160" y="475" fill="#58a6ff" font-family="Arial, sans-serif" font-size="26" font-weight="700">HTTP-only Lanes</text>
  <text x="160" y="515" fill="#c9d1d9" font-family="Arial, sans-serif" font-size="18">• daily claim</text>
  <text x="160" y="545" fill="#c9d1d9" font-family="Arial, sans-serif" font-size="18">• farming claim/start</text>
  <text x="160" y="575" fill="#c9d1d9" font-family="Arial, sans-serif" font-size="18">• free spin</text>
  <text x="160" y="605" fill="#c9d1d9" font-family="Arial, sans-serif" font-size="18">• drop game</text>
  <text x="160" y="635" fill="#c9d1d9" font-family="Arial, sans-serif" font-size="18">• OpenAD 9001</text>

  <rect x="610" y="430" width="420" height="220" rx="18" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="640" y="475" fill="#a371f7" font-family="Arial, sans-serif" font-size="26" font-weight="700">Browser + SDK Lanes</text>
  <text x="640" y="515" fill="#c9d1d9" font-family="Arial, sans-serif" font-size="18">• AdsGram image 8003</text>
  <text x="640" y="545" fill="#c9d1d9" font-family="Arial, sans-serif" font-size="18">• AdsGram video 8002</text>
  <text x="640" y="585" fill="#8b949e" font-family="Arial, sans-serif" font-size="16">Runner flow:</text>
  <text x="640" y="613" fill="#c9d1d9" font-family="Arial, sans-serif" font-size="18">start → check → SDK show → check → claim</text>

  <rect x="1120" y="430" width="200" height="220" rx="18" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="1148" y="475" fill="#3fb950" font-family="Arial, sans-serif" font-size="26" font-weight="700">Guards</text>
  <text x="1148" y="515" fill="#c9d1d9" font-family="Arial, sans-serif" font-size="18">• next_due_ts</text>
  <text x="1148" y="545" fill="#c9d1d9" font-family="Arial, sans-serif" font-size="18">• daily caps</text>
  <text x="1148" y="575" fill="#c9d1d9" font-family="Arial, sans-serif" font-size="18">• reserve floor</text>
  <text x="1148" y="605" fill="#c9d1d9" font-family="Arial, sans-serif" font-size="18">• parking</text>
  <text x="1148" y="635" fill="#c9d1d9" font-family="Arial, sans-serif" font-size="18">• safe-mode</text>

  <line x1="350" y1="230" x2="420" y2="230" stroke="#58a6ff" stroke-width="4"/>
  <polygon points="420,230 405,222 405,238" fill="#58a6ff"/>
  <line x1="980" y1="230" x2="1080" y2="230" stroke="#d29922" stroke-width="4"/>
  <polygon points="1080,230 1065,222 1065,238" fill="#d29922"/>
  <line x1="700" y1="320" x2="700" y2="430" stroke="#3fb950" stroke-width="4"/>
  <polygon points="700,430 692,415 708,415" fill="#3fb950"/>
  <line x1="560" y1="320" x2="320" y2="430" stroke="#58a6ff" stroke-width="4"/>
  <polygon points="320,430 332,417 338,432" fill="#58a6ff"/>
  <line x1="850" y1="320" x2="1120" y2="430" stroke="#a371f7" stroke-width="4"/>
  <polygon points="1120,430 1104,430 1110,415" fill="#a371f7"/>
</svg>
